<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Kepanitiaan</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- Logout Button -->
    <button class="logout-btn" id="logoutBtn" style="display:none;" onclick="window.logout()">🚪 Logout</button>

    <div class="container" id="app">
        <!-- Login Page -->
        <div id="login-page">
            <h2>🔐 Login</h2>
            <div id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="email@example.com" /></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" /></div>
                <button class="btn-primary" onclick="window.login()" style="width:100%;">Masuk</button>
                <p style="margin-top:10px; font-size:14px; color:#64748b;">Akun bawaan: <strong>ketua@panitia.com</strong> (password: rahasia123)</p>
                <p class="auth-toggle" onclick="window.toggleAuth('register')">Belum punya akun? Daftar di sini</p>
                <div id="loginMessage" style="margin-top:10px; color:#b91c1c;"></div>
                <div id="resetMessage" style="margin-top:10px; color:#2563eb;"></div>
                <span class="reset-link" onclick="window.resetPassword()">🔓 Lupa Password? Reset di sini</span>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="form-group"><label>Email</label><input type="email" id="registerEmail" placeholder="email@example.com" /></div>
                <div class="form-group"><label>Password</label><input type="password" id="registerPassword" placeholder="••••••••" /></div>
                <button class="btn-primary" onclick="window.register()" style="width:100%;">Daftar</button>
                <p class="auth-toggle" onclick="window.toggleAuth('login')">Sudah punya akun? Login</p>
                <div id="registerMessage" style="margin-top:10px; color:#b91c1c;"></div>
            </div>
        </div>

        <!-- Home Page -->
        <div id="page-home" class="page">
            <h1 style="text-align:center; margin-bottom:10px;">📋 Pilih Divisi</h1>
            <div id="profileCard" class="profile-card"></div>
            <div class="card-grid" id="menuCards"></div>
            <p style="text-align:center; color:#94a3b8; font-size:14px;">⚠️ Upload melewati deadline akan tercatat sebagai <strong>Pelanggaran</strong></p>
        </div>

        <!-- Dynamic Page -->
        <div id="page-dynamic" class="page">
            <button class="back-btn" onclick="window.goHome()">⬅ Kembali ke Utama</button>
            <h2 id="dynamic-title">Judul</h2>
            <div id="dynamic-content"></div>
        </div>
    </div>

    <!-- Load Modul JavaScript -->
    <script type="module">
        // Import semua modul yang diperlukan
        import { initApp, login, register, logout, toggleAuth, resetPassword, goHome, navigateTo } from './js/app.js';
        import { renderKetua } from './js/roles/ketua.js';
        import { renderBendahara } from './js/roles/bendahara.js';
        import { renderSekretaris } from './js/roles/sekretaris.js';
        import { renderSie } from './js/roles/sie.js';
        import { renderHumas } from './js/roles/humas.js';
        import { renderDpl } from './js/roles/dpl.js';

        // Ekspos fungsi ke window agar bisa dipanggil dari HTML
        window.login = login;
        window.register = register;
        window.logout = logout;
        window.toggleAuth = toggleAuth;
        window.resetPassword = resetPassword;
        window.goHome = goHome;
        window.navigateTo = navigateTo;

        // Inisialisasi aplikasi
        initApp();
    </script>
</body>
</html>
